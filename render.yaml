services:
  - type: web
    name: no-second-chances-bot
    env: docker
    plan: free
    dockercontext: .
    dockerfilepath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_URL
        sync: false
      - key: SELF_PING_URL
        description: The public URL of this service (e.g. https://no-second-chances.onrender.com)
        sync: false
